<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        #chat {
            height: 60vh;
            overflow-y: auto;
        }
        .bubble {
            max-width: 80%;
            word-wrap: break-word;
        }
        .thinking span {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.2s ease-in-out infinite;
        }
        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <div class="container py-5" style="max-width: 700px;">
        <div class="card shadow-sm">
            <div class="card-header text-center fw-semibold">Data Center RAG Assistant</div>
            <div class="card-body p-3" id="chat"></div>
            <div class="card-footer">
                <div class="input-group">
                    <input type="text" class="form-control" id="query" placeholder="Ask about EN 50600..." autofocus>
                    <button class="btn btn-dark" id="send" onclick="ask()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('query');
        const btn = document.getElementById('send');

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !btn.disabled) ask();
        });

        function ask() {
            const q = input.value.trim();
            if (!q) return;

            addMessage(q, 'user');
            input.value = '';
            btn.disabled = true;

            const thinking = addThinking();

            fetch(`/?q=${encodeURIComponent(q)}`, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(r => r.json())
            .then(data => {
                thinking.remove();
                addMessage(data.answer, 'assistant', data.source);
                btn.disabled = false;
                input.focus();
            })
            .catch(() => {
                thinking.remove();
                addMessage('Something went wrong.', 'assistant');
                btn.disabled = false;
            });
        }

        function addMessage(text, role, source) {
            const wrapper = document.createElement('div');
            wrapper.className = `d-flex mb-3 ${role === 'user' ? 'justify-content-end' : 'justify-content-start'}`;

            const bubble = document.createElement('div');
            bubble.className = `bubble rounded-3 px-3 py-2 ${role === 'user' ? 'bg-dark text-white' : 'bg-light border'}`;
            bubble.textContent = text;
            wrapper.appendChild(bubble);

            if (source) {
                const src = document.createElement('small');
                src.className = 'text-muted d-block mt-1 ms-1';
                src.textContent = `Source: ${source}`;
                const col = document.createElement('div');
                col.appendChild(wrapper);
                col.appendChild(src);
                chat.appendChild(col);
            } else {
                chat.appendChild(wrapper);
            }

            chat.scrollTop = chat.scrollHeight;
        }

        function addThinking() {
            const wrapper = document.createElement('div');
            wrapper.className = 'd-flex mb-3 justify-content-start';
            wrapper.innerHTML = '<div class="thinking d-flex gap-1 px-3 py-2"><span></span><span></span><span></span></div>';
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
            return wrapper;
        }
    </script>
</body>
</html>
